    <rect x="-140" y="-1.2" width="16" height="2.4" rx="1.2" fill="#ffffff"/>
    <rect x="124"  y="-1.2" width="16" height="2.4" rx="1.2" fill="#ffffff"/>
    <circle cx="-90" cy="-90" r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="90"  cy="-90" r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="-90" cy="90"  r="1.2" fill="#ffffff" opacity="0.5"/>
    <circle cx="90"  cy="90"  r="1.2" fill="#ffffff" opacity="0.5"/>
    <polygon points="0,-120 -10,-84 0,-90" fill="#ffffff"/>
    <polygon points="0,-120  10,-84 0,-90" fill="#ffffff" opacity="0.7"/>
    <polygon points="-62,-84 -26,-84 0,54 -10,70" fill="#ffffff"/>
    <polygon points="-26,-84 0,54 0,30 -17,-68" fill="#ffffff" opacity="0.6"/>
